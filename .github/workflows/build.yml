name: build-dyychu

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install ldid
        run: brew install ldid

      - name: Build arm64 dylib
        run: |
          set -ex
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -isysroot "$SDK" \
            -mios-version-min=14.0 \
            -fobjc-arc \
            -dynamiclib \
            -install_name "@rpath/libDYYCHUnlock.dylib" \
            -framework Foundation \
            -framework CoreFoundation \
            -framework UIKit \
            -lobjc \
            -O2 \
            -Wno-deprecated-declarations \
            -Wno-unused-variable \
            DYYCHUnlock.m \
            -o libDYYCHUnlock.dylib

      - name: Codesign with ldid
        run: |
          ldid -S libDYYCHUnlock.dylib
          file libDYYCHUnlock.dylib
          ls -la libDYYCHUnlock.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libDYYCHUnlock
          path: libDYYCHUnlock.dylib
